name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: pkg
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Validate tag version
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          $tagVersion = $env:TAG_NAME.TrimStart('v')
          if ($tagVersion -ne $env:VERSION) {
            throw "tag 版本 ($env:TAG_NAME) 与 package.json version ($env:VERSION) 不一致"
          }

      - name: Typecheck
        run: npm run typecheck

      - name: Build release artifacts
        run: node scripts/run-electron-builder.mjs --win portable nsis --x64

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          $portable = "release/RubiKey-$env:VERSION-portable.exe"
          $setup = "release/RubiKey-$env:VERSION-setup.exe"
          $blockmap = "release/RubiKey-$env:VERSION-setup.exe.blockmap"

          if (!(Test-Path $portable)) { throw "未找到产物: $portable" }
          if (!(Test-Path $setup)) { throw "未找到产物: $setup" }

          $assets = @($portable, $setup)
          if (Test-Path $blockmap) {
            $assets += $blockmap
          }

          gh release view $env:TAG_NAME --repo $env:REPO *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $assets --repo $env:REPO --clobber
          } else {
            gh release create $env:TAG_NAME $assets --repo $env:REPO --title $env:TAG_NAME --generate-notes
          }
