<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RubiKey</title>
    <script>
      try {
        const savedTheme = window.localStorage.getItem("rubikey.theme");
        const initialTheme = savedTheme === "blossom" ? "blossom" : "mist";
        document.documentElement.dataset.theme = initialTheme;
      } catch {
        document.documentElement.dataset.theme = "mist";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app/renderer/main.tsx"></script>
  </body>
</html>
